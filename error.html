<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>系統維護中</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <style>
    body {font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
          margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0f172a; color:#e2e8f0;}
    .card {max-width:640px; padding:32px; background:#111827; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.35);}
    h1 {margin:0 0 8px; font-size:28px;}
    p {margin:8px 0 0; line-height:1.6;}
    .meta {margin-top:16px; font-size:14px; color:#94a3b8;}
    .cta a {display:inline-block; margin-top:16px; padding:10px 14px; background:#2563eb; color:#fff; border-radius:8px; text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>🛠 系統維護中</h1>
    <p>我們正在進行更新與優化，服務暫時不可用。造成不便，敬請見諒。</p>
    <p>預計恢復時間：<strong>約 60 分鐘內</strong></p>
    <div class="cta"><a href="https://status.example.com">查看最新進度</a></div>
    <div class="meta">事件編號：#MAINT-<span id="today"></span>｜若急需協助，請聯繫 roger@mvacf.org.tw</div>
  </div>
  <script>
    // 取得今天日期
    const today = new Date();

    // 格式化日期（YYYY-MM-DD）
    const formattedDate = today.getFullYear() + '-' +
                          String(today.getMonth() + 1).padStart(2, '0') + '-' +
                          String(today.getDate()).padStart(2, '0');
    // 顯示在 HTML
    document.getElementById('today').textContent = formattedDate;
  </script>
</body>
</html>
